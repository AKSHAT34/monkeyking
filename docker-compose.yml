
version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8080:8000"
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - MK_SECRET_KEY=${MK_SECRET_KEY}
      - MK_DB_PATH=/app/data/monkeyking.db
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=qwen2.5:3b
      - GOOGLE_AI_KEY=${GOOGLE_AI_KEY}
      - PYTHONUNBUFFERED=1
    volumes:
      - mk_data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8021:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mk_data:
