# MonkeyKing Configuration
user:
  name: "Your Name"
  email: "you@example.com"
  phone: "+1 555 555 0100"
  location: "Bangalore, India"
  linkedin: "linkedin.com/in/your-handle"

job_preferences:
  target_roles:
    - "AI Product Manager"
    - "AI Program Manager"
    - "AI Account Manager"
    - "AI Project Manager"
    - "Product Manager - AI/ML"
    - "Technical Program Manager - AI"
    - "Strategic Account Manager - AI"
    - "Product Owner - AI Platforms"
    - "AI Operations Manager"
    - "AI Platform Manager"
  
  keywords:
    - "artificial intelligence"
    - "machine learning"
    - "AI agents"
    - "conversational AI"
    - "product management"
    - "program management"
    - "account management"
    - "AI platforms"
    - "enterprise AI"
    - "AI automation"
  
  location_preference: "india_remote"  # india_remote = India-based or Remote roles
  preferred_locations:
    - "Remote"
    - "Bangalore"
    - "Mumbai"
    - "Delhi"
    - "Hyderabad"
    - "Pune"
    - "Chennai"
    - "Gurgaon"
    - "Noida"
    - "India"
  
  work_authorization:
    country: "India"
    needs_sponsorship: true  # For non-India roles
    willing_to_relocate: true
  
  min_match_score: 0.6  # 0-1, minimum relevance score to apply
  max_applications_per_run: 100
  
  exclude_companies: []
  
  experience_years: 9

